apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: user-service-db-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: localstack-secret-store
    kind: ClusterSecretStore
  target:
    name: user-service-db-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: user-service/db-password
        property: password
