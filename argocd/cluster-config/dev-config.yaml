apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-config-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: dev
  source:
    repoURL: https://github.com/anandbte6113/gitops-platform.git
    targetRevision: HEAD
    path: cluster-config/dev
  destination:
    server: https://172.19.0.3:6443
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
